name: Windows Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-make
          mingw-w64-ucrt-x86_64-llvm
          mingw-w64-ucrt-x86_64-zstd
          mingw-w64-ucrt-x86_64-zlib

    - name: Build Quanta
      run: |
        mkdir -p build
        cd build
        cmake -G "MinGW Makefiles" ..
        cmake --build .

    - name: Bundle GCC compiler into installer directory
      run: |
        mkdir -p windows_installer/compiler
        # Copy gcc.exe itself
        cp /ucrt64/bin/gcc.exe windows_installer/compiler/gcc.exe
        # Copy all required DLLs that gcc.exe depends on
        cp /ucrt64/bin/libgcc_s_seh-1.dll     windows_installer/compiler/ 2>/dev/null || true
        cp /ucrt64/bin/libstdc++-6.dll         windows_installer/compiler/ 2>/dev/null || true
        cp /ucrt64/bin/libwinpthread-1.dll     windows_installer/compiler/ 2>/dev/null || true
        cp /ucrt64/bin/libgomp-1.dll           windows_installer/compiler/ 2>/dev/null || true
        cp /ucrt64/bin/ucrtbase.dll            windows_installer/compiler/ 2>/dev/null || true
        echo "Bundled compiler files:"
        ls windows_installer/compiler/

    - name: Build Windows Installer
      shell: pwsh
      run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows_installer\quanta.iss'

    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: Quanta-Windows-Installer
        path: windows_installer/Output/Quanta_Installer_v1.0.exe
